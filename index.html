<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css">
    <title>weather-warn</title>
  </head>
  <body x-data="app">
    <form>
      <label for="search">Enter your city: </label>
      <input type="search" placeholder="Search city.." id="search" required aria-required="true" x-model="city">
      
      <label for="day">Day: </label>
      <select id="day" x-model="day">
        <option value="0" selected>Today</option>
        <option value="1">Tomorrow</option>
        <option value="2">2 days after</option>
        <option value="3">3 days after</option>
        <option value="4">4 days after</option>
        <option value="5">5 days after</option>
        <option value="6">6 days after</option>
      </select>
      
      <button @click="scan">Scan City</button>
      <p x-text="errMsg ? errMsg : ''" class="p-2 text-center font-bold text-red-500"></p>
    </form>
    
    <section>
      <article>
        <header>
          <img :src="resImg" :alt="resImgAlt">
          <h2 x-text="resTitle"></h2>
        </header>
        <p x-text="resBody"></p>
        
        <p x-text="temp ? `Temperature: ${temp}` : ''"></p>
        <p x-text="wind ? `Wind Speed: ${wind}` : ''"></p>
      </article>
      <article x-show="isEarthQuake">
        <header>
          <img src="src/images/earthquake.png" alt="Earthquake warning" />
          <h2 x-text="quakeTitle"></h2>
        </header>
      </article>
    </section>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
